<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Healthcare Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#f4f7fb;font-family:Arial,sans-serif}
.header{background:linear-gradient(90deg,#0d6efd,#20c997);color:#fff;padding:20px;border-radius:15px;margin-bottom:30px}
.card{border:none;border-radius:16px;transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(0,0,0,.15)}
.kpi1{background:linear-gradient(135deg,#0d6efd,#4dabf7);color:#fff}
.kpi2{background:linear-gradient(135deg,#198754,#20c997);color:#fff}
.kpi3{background:linear-gradient(135deg,#6f42c1,#b197fc);color:#fff}
.chart-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.1)}
canvas{width:100%!important;height:420px!important}
</style>
</head>
<body>
<div class="container py-4">
<div class="header text-center"><h1>🏥 AI Healthcare Dashboard</h1></div>

<div class="row g-4">
<div class="col-md-4"><div class="card kpi1 text-center p-4"><h2>{{ total_patients }}</h2><p>Total Patients</p></div></div>
<div class="col-md-4"><div class="card kpi2 text-center p-4"><h2>{{ avg_conf }}%</h2><p>Average Confidence</p></div></div>
<div class="col-md-4"><div class="card kpi3 text-center p-4"><h2>{{ common_disease }}</h2><p>Most Common Disease</p></div></div>
</div>

<div class="row mt-4 g-4">
<div class="col-lg-6"><div class="chart-card"><h4 class="text-center">🍩 Disease Distribution</h4><canvas id="pieChart"></canvas></div></div>
<div class="col-lg-6"><div class="chart-card"><h4 class="text-center">📊 Average Confidence</h4><canvas id="barChart"></canvas></div></div>
</div>

<div class="row mt-4">
<div class="col-12"><div class="chart-card"><h4 class="text-center">📈 Daily Patient Registrations</h4><canvas id="lineChart"></canvas></div></div>
</div>

<div class="text-center mt-4">
<a href="/" class="btn btn-primary btn-lg">🏠 Home</a>
<a href="/history" class="btn btn-success btn-lg">📋 History</a>
</div>
</div>

<script>
new Chart(document.getElementById("pieChart"),{
type:"doughnut",
data:{
labels:{{ labels|tojson }},
datasets:[{
data:{{ values|tojson }},
backgroundColor:["#0d6efd","#198754","#ffc107","#dc3545","#6f42c1","#fd7e14","#20c997","#0dcaf0","#d63384","#6610f2","#6c757d","#ff6b6b"],
borderColor:"#fff",
borderWidth:3,
hoverOffset:20
}]
},
options:{responsive:true,maintainAspectRatio:false}
});

new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:{{ confidence_labels|tojson }},
datasets:[{
label:"Average Confidence (%)",
data:{{ confidence_values|tojson }},
backgroundColor:["#0d6efd","#198754","#ffc107","#dc3545","#6f42c1","#fd7e14","#20c997","#0dcaf0","#d63384","#6610f2","#6c757d","#ff6b6b"],
borderRadius:8
}]
},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100}}}
});

new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:{{ date_labels|tojson }},
datasets:[{
label:"Patients Registered",
data:{{ patient_counts|tojson }},
fill:true,
backgroundColor:"rgba(13,110,253,.15)",
borderColor:"#0d6efd",
pointBackgroundColor:"#0d6efd",
borderWidth:3,
tension:.4
}]
},
options:{responsive:true,maintainAspectRatio:false}
});
</script>
</body>
</html>
